site_name: pw-env
site_description: Securely load environment variables from password managers
site_url: !ENV [SITE_URL, "https://m42e.github.io/pw-env/"]
repo_url: https://github.com/m42e/pw-env
repo_name: m42e/pw-env
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: site
hooks:
  - mkdocs_hooks.py

theme:
  name: material
  language: en
  logo: assets/images/pw-env-mark.svg
  favicon: assets/images/pw-env-mark.svg
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - scheme: pwenv-light
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: pwenv-dark
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: false
  - pymdownx.details
  - pymdownx.highlight:
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/m42e/pw-env

extra_css:
  - assets/stylesheets/extra.css

nav:
  - Home: index.md
  - Getting started:
      - Installation: getting-started/installation.md
      - First project: getting-started/first-project.md
      - Shell integration: getting-started/shell-integration.md
  - Guides:
      - Migrating plaintext secrets: guides/migrate-secrets.md
      - Approvals and trust: guides/approvals.md
      - Updating pw-env: guides/update.md
  - Concepts:
      - Resolution model: concepts/resolution-model.md
      - Configuration model: concepts/configuration-model.md
  - Reference:
      - CLI: reference/cli.md
      - Configuration file: reference/configuration-file.md