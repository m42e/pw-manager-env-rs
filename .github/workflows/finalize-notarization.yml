name: Finalize macOS Notarization

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional tag to poll (for example v1.2.3)"
        required: false
        type: string

permissions:
  actions: write
  contents: write

concurrency:
  group: finalize-notarization
  cancel-in-progress: false

jobs:
  finalize:
    name: Poll Apple notarization
    runs-on: macos-14
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      SELECTED_TAG: ${{ inputs.tag || '' }}
      MACOS_NOTARIZATION_SECRETS_PRESENT: ${{ secrets.APPLE_ID != '' && secrets.APPLE_APP_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}
    steps:
      - name: Skip when notarization secrets are unavailable
        if: env.MACOS_NOTARIZATION_SECRETS_PRESENT != 'true'
        run: |
          echo "::notice title=Disabled::Apple notarization secrets not configured; skipping notarization finalization."
          echo "Apple notarization secrets not configured; skipping notarization finalization."

      - name: Poll pending macOS notarization submissions
        if: env.MACOS_NOTARIZATION_SECRETS_PRESENT == 'true'
        shell: bash
        run: |
          set -euo pipefail

          echo '## macOS notarization poll' >> "$GITHUB_STEP_SUMMARY"

          artifact_prefix='notarization-'
          if [ -n "$SELECTED_TAG" ]; then
            artifact_prefix="notarization-$SELECTED_TAG-"
          fi

          artifacts_file="$RUNNER_TEMP/notarization-artifacts.txt"
          gh api "repos/$GH_REPO/actions/artifacts" --paginate \
            --jq ".artifacts[] | select((.expired | not) and (.name | startswith(\"$artifact_prefix\"))) | @base64" \
            > "$artifacts_file"

          artifact_count=$(grep -c '.' "$artifacts_file" || true)
          total_count=0
          accepted_count=0
          pending_count=0
          failed_count=0
          skipped_count=0

          echo "Artifact prefix: $artifact_prefix"
          echo "Found $artifact_count pending notarization artifact(s)."
          echo "::notice title=Scan::Found $artifact_count pending notarization artifact(s) for prefix $artifact_prefix"
          printf '%s\n' "- Artifact prefix: $artifact_prefix" >> "$GITHUB_STEP_SUMMARY"
          printf '%s\n' "- Pending notarization artifacts found: $artifact_count" >> "$GITHUB_STEP_SUMMARY"

          if [ "$artifact_count" -eq 0 ]; then
            echo "::notice title=Done::No pending macOS notarization artifacts found."
            echo "No pending macOS notarization artifacts found."
            printf '%s\n' '- No pending notarization artifacts found.' >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          while IFS= read -r encoded_artifact; do
            [ -n "$encoded_artifact" ] || continue

            total_count=$((total_count + 1))
            artifact_json=$(printf '%s' "$encoded_artifact" | base64 --decode)
            artifact_id=$(jq -r '.id' <<<"$artifact_json")
            artifact_name=$(jq -r '.name' <<<"$artifact_json")
            run_id=$(jq -r '.workflow_run.id // empty' <<<"$artifact_json")

            echo "Checking artifact $artifact_name (id=$artifact_id, run_id=${run_id:-none})"

            if [ -z "$run_id" ]; then
              echo "::warning title=Skipped::$artifact_name is missing workflow run information and will be skipped."
              echo "Artifact $artifact_name is missing workflow run information; skipping."
              printf '%s\n' "- Skipped $artifact_name because the source workflow run is unavailable." >> "$GITHUB_STEP_SUMMARY"
              skipped_count=$((skipped_count + 1))
              continue
            fi

            workdir=$(mktemp -d)
            artifact_dir="$workdir/artifact"
            mkdir -p "$artifact_dir"
            gh run download "$run_id" -R "$GH_REPO" -n "$artifact_name" -D "$artifact_dir"

            metadata_file=$(find "$artifact_dir" -name '*.json' -print -quit)
            if [ -z "$metadata_file" ]; then
              echo "::warning title=Skipped::$artifact_name did not contain a metadata JSON file and will be deleted."
              echo "Artifact $artifact_name does not contain notarization metadata; deleting it."
              printf '%s\n' "- Deleted $artifact_name because it did not contain a metadata JSON file." >> "$GITHUB_STEP_SUMMARY"
              gh api -X DELETE "repos/$GH_REPO/actions/artifacts/$artifact_id"
              skipped_count=$((skipped_count + 1))
              rm -rf "$workdir"
              continue
            fi

            tag=$(jq -r '.tag' "$metadata_file")
            checked_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            target=$(jq -r '.target' "$metadata_file")
            binary=$(jq -r '.binary' "$metadata_file")
            archive=$(jq -r '.archive' "$metadata_file")
            asset_name=$(jq -r '.asset_name' "$metadata_file")
            submission_id=$(jq -r '.submission_id' "$metadata_file")
            submitted_at=$(jq -r '.submitted_at // "unknown"' "$metadata_file")
            response_file="$workdir/${target}-notary-info.json"
            asset_dir="$workdir/${target}"
            package_dir="$asset_dir/package"
            asset_path="$asset_dir/$asset_name"
            binary_path="$package_dir/$binary"

            echo "Processing tag=$tag target=$target asset=$asset_name submission_id=$submission_id submitted_at=$submitted_at"

            xcrun notarytool info "$submission_id" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --output-format json > "$response_file"

            status=$(jq -r '.status // "Unknown"' "$response_file")
            status_summary=$(jq -r '.statusSummary // empty' "$response_file")
            echo "Apple status for $tag $target: $status"
            if [ -n "$status_summary" ]; then
              echo "Apple status summary: $status_summary"
            fi

            case "$status" in
              Accepted)
                echo "::notice title=Accepted::$tag $target accepted by Apple; updating release asset."
                echo "Notarization accepted for $tag $target; downloading release asset and stapling binary."
                mkdir -p "$package_dir"
                gh release download "$tag" -R "$GH_REPO" --pattern "$asset_name" --dir "$asset_dir"

                case "$archive" in
                  tar.gz)
                    tar -xzf "$asset_path" -C "$package_dir"
                    ;;
                  zip)
                    ditto -x -k "$asset_path" "$package_dir"
                    ;;
                  *)
                    echo "::warning title=Failed::$tag $target has unsupported archive format $archive."
                    echo "Unsupported archive format $archive for $artifact_name"
                    printf '%s\n' "- $tag $target: unsupported archive format $archive." >> "$GITHUB_STEP_SUMMARY"
                    gh api -X DELETE "repos/$GH_REPO/actions/artifacts/$artifact_id"
                    failed_count=$((failed_count + 1))
                    rm -rf "$workdir"
                    continue
                    ;;
                esac

                if [ ! -f "$binary_path" ]; then
                  echo "::warning title=Failed::$tag $target packaged binary was missing after download."
                  echo "Packaged binary $binary_path is missing for $artifact_name"
                  printf '%s\n' "- $tag $target: packaged binary was missing after download." >> "$GITHUB_STEP_SUMMARY"
                  gh api -X DELETE "repos/$GH_REPO/actions/artifacts/$artifact_id"
                  failed_count=$((failed_count + 1))
                  rm -rf "$workdir"
                  continue
                fi

                stapler_exit=0
                xcrun stapler staple "$binary_path" || stapler_exit=$?
                if [ "$stapler_exit" -eq 73 ]; then
                  echo "::notice title=Pending::$tag $target stapling deferred (CDN propagation delay); will retry next run."
                  echo "Stapler CDN delay (exit 73) for $tag $target; keeping artifact for retry."
                  printf '%s\n' "- $tag $target: stapling deferred (CDN propagation delay); will retry." >> "$GITHUB_STEP_SUMMARY"
                  pending_count=$((pending_count + 1))
                  rm -rf "$workdir"
                  continue
                elif [ "$stapler_exit" -ne 0 ]; then
                  echo "::warning title=Failed::$tag $target stapling failed with exit code $stapler_exit."
                  echo "Stapling failed for $tag $target with exit code $stapler_exit"
                  printf '%s\n' "- $tag $target: stapling failed with exit code $stapler_exit." >> "$GITHUB_STEP_SUMMARY"
                  gh api -X DELETE "repos/$GH_REPO/actions/artifacts/$artifact_id"
                  failed_count=$((failed_count + 1))
                  rm -rf "$workdir"
                  continue
                fi
                xcrun stapler validate "$binary_path"

                case "$archive" in
                  tar.gz)
                    if [ -f "$package_dir/LICENSE" ]; then
                      tar -czf "$asset_path" -C "$package_dir" "$binary" LICENSE
                    else
                      tar -czf "$asset_path" -C "$package_dir" "$binary"
                    fi
                    ;;
                  zip)
                    rm -f "$asset_path"
                    if [ -f "$package_dir/LICENSE" ]; then
                      cd "$package_dir"
                      zip -qry "$asset_path" .
                    else
                      ditto -c -k --keepParent "$binary_path" "$asset_path"
                    fi
                    ;;
                esac

                gh release upload "$tag" -R "$GH_REPO" "$asset_path" --clobber
                gh api -X DELETE "repos/$GH_REPO/actions/artifacts/$artifact_id"
                accepted_count=$((accepted_count + 1))
                echo "::notice title=Completed::$tag $target completed; release asset replaced."
                echo "Completed $tag $target; release asset replaced and artifact deleted."
                printf '%s\n' "- $tag $target: notarization accepted and release asset updated." >> "$GITHUB_STEP_SUMMARY"
                ;;
              "In Progress")
                pending_count=$((pending_count + 1))
                echo "::notice title=Pending::$tag $target still pending at $checked_at."
                echo "Still pending: $tag $target at $checked_at"
                printf '%s\n' "- $tag $target: still in progress at $checked_at." >> "$GITHUB_STEP_SUMMARY"
                ;;
              *)
                failed_count=$((failed_count + 1))
                echo "::warning title=Failed::$tag $target ended with terminal status $status."
                echo "Terminal notarization status for $tag $target: $status"
                printf '%s\n' "- $tag $target: terminal status $status. ${status_summary:-No summary provided.}" >> "$GITHUB_STEP_SUMMARY"
                gh api -X DELETE "repos/$GH_REPO/actions/artifacts/$artifact_id"
                ;;
            esac

            rm -rf "$workdir"
          done < "$artifacts_file"

          echo "Finalize summary: total=$total_count accepted=$accepted_count pending=$pending_count failed=$failed_count skipped=$skipped_count"
          echo "::notice title=Summary::total=$total_count accepted=$accepted_count pending=$pending_count failed=$failed_count skipped=$skipped_count"
          printf '%s\n' '' >> "$GITHUB_STEP_SUMMARY"
          printf '%s\n' "- Summary: total=$total_count accepted=$accepted_count pending=$pending_count failed=$failed_count skipped=$skipped_count" >> "$GITHUB_STEP_SUMMARY"

          if [ "$pending_count" -eq 0 ]; then
            echo "::notice title=Done::All checked notarization submissions are complete or terminal."
            echo "All checked notarization submissions are complete or terminal."
          else
            echo "::notice title=Pending::At least one notarization submission is still pending."
            echo "At least one notarization submission is still pending."
          fi
