name: Mutation Testing

on:
  schedule:
    - cron: '0 3 * * 1' # every Monday at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mutants:
    name: Mutation Testing (Shard ${{ matrix.shard }}/8)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin: v6.0.2

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # pin: v1
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # pin: v2.9.1

      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked

      - name: Run mutation tests
        run: cargo mutants --no-shuffle -vV --baseline=skip --shard ${{ matrix.shard }}/8

      - name: Upload mutants results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: mutants-results-shard-${{ matrix.shard }}
          path: mutants.out/

  aggregate-mutants-results:
    name: Aggregate Mutation Artifacts
    runs-on: ubuntu-latest
    needs: mutants
    if: always()
    steps:
      - name: Download shard artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # pin: v8.0.1
        with:
          pattern: mutants-results-shard-*
          path: mutants-results-shards
          merge-multiple: false

      - name: Create combined zip
        run: zip -r mutants-results-all-shards.zip mutants-results-shards

      - name: Build missed mutants summary
        shell: bash
        run: |
          set -euo pipefail

          summary_file="mutants-missed-summary.md"
          {
            echo "# Mutation Misses by Shard"
            echo
          } > "$summary_file"

          mapfile -t missed_files < <(find mutants-results-shards -type f -name missed.txt | sort)

          if [ "${#missed_files[@]}" -eq 0 ]; then
            {
              echo "No missed.txt files were found in shard artifacts."
              echo
            } >> "$summary_file"
          else
            for missed_file in "${missed_files[@]}"; do
              shard_label=$(echo "$missed_file" | sed -E 's#.*(mutants-results-shard-[0-9]+).*#\1#')

              {
                echo "## ${shard_label}"
                echo
              } >> "$summary_file"

              if [ ! -s "$missed_file" ]; then
                {
                  echo "No missed mutants."
                  echo
                } >> "$summary_file"
                continue
              fi

              {
                echo '```text'
                cat "$missed_file"
                echo '```'
                echo
              } >> "$summary_file"
            done
          fi

          cat "$summary_file" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload missed mutants summary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # pin: v7.0.0
        with:
          name: mutants-missed-summary
          path: mutants-missed-summary.md

      - name: Upload combined zip
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # pin: v7.0.0
        with:
          name: mutants-results-all-shards
          path: mutants-results-all-shards.zip
