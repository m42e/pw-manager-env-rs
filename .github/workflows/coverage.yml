name: Coverage

on:
  push:
    branches: [main]
    paths:
      - src/**
      - tests/**
      - Cargo.toml
      - Cargo.lock
  pull_request:
    paths:
      - src/**
      - tests/**
      - Cargo.toml
      - Cargo.lock

permissions:
  contents: read

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin: v6.0.2

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # pin: v1
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # pin: v2.9.1

      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Run coverage
        run: cargo tarpaulin --out Lcov --output-dir coverage/ --verbose -- --test-threads=1

      - name: Write coverage summary
        shell: bash
        run: |
          set -euo pipefail
          lcov_file="coverage/lcov.info"
          if [[ ! -f "$lcov_file" ]]; then
            echo "No lcov.info found" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          total_lines=0
          hit_lines=0
          while IFS= read -r line; do
            case "$line" in
              DA:*)
                count="${line#DA:*,}"
                total_lines=$((total_lines + 1))
                if [[ "$count" -gt 0 ]]; then
                  hit_lines=$((hit_lines + 1))
                fi
                ;;
            esac
          done < "$lcov_file"
          if [[ "$total_lines" -gt 0 ]]; then
            pct=$(awk "BEGIN { printf \"%.1f\", $hit_lines * 100 / $total_lines }")
            echo "## Coverage Report" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| Lines Hit | Total Lines | Coverage |" >> "$GITHUB_STEP_SUMMARY"
            echo "|----------:|------------:|---------:|" >> "$GITHUB_STEP_SUMMARY"
            echo "| $hit_lines | $total_lines | ${pct}% |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Coverage Report" >> "$GITHUB_STEP_SUMMARY"
            echo "No instrumented lines found." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # pin: v7.0.1
        with:
          name: coverage-report
          path: coverage/
