name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
  BINARY_NAME: pw-env
  MACOS_SIGNING_SECRETS_PRESENT: ${{ secrets.APPLE_CERT_BASE64 != '' && secrets.APPLE_CERT_PASSWORD != '' && secrets.APPLE_SIGNING_IDENTITY != '' }}
  MACOS_NOTARIZATION_SECRETS_PRESENT: ${{ secrets.APPLE_ID != '' && secrets.APPLE_APP_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: pw-env
            archive: tar.gz
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: pw-env
            archive: tar.gz
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary: pw-env.exe
            archive: zip
          - runner: macos-14
            target: x86_64-apple-darwin
            binary: pw-env
            archive: tar.gz
          - runner: macos-14
            target: aarch64-apple-darwin
            binary: pw-env
            archive: tar.gz
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin: v6.0.2
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # pin: v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # pin: v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # Ubuntu images may ship either pkg-config or pkgconf; install whichever exists.
          sudo apt-get update -q || sudo apt-get update -q
          if apt-cache show pkg-config >/dev/null 2>&1; then
            sudo apt-get install -y libdbus-1-dev pkg-config
          else
            sudo apt-get install -y libdbus-1-dev pkgconf
          fi

      - name: Verify tag matches crate version
        shell: bash
        run: |
          crate_version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          tag_version="${RELEASE_TAG#v}"
          if [ "$crate_version" != "$tag_version" ]; then
            echo "::error::Crate version $crate_version does not match tag version $tag_version"
            exit 1
          fi

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare Apple signing keychain
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.target }}
        run: |
          if [ "$MACOS_SIGNING_SECRETS_PRESENT" != "true" ]; then
            echo "Apple signing secrets not configured; skipping macOS signing setup."
            exit 0
          fi

          cert_path="$RUNNER_TEMP/apple-signing-cert.p12"
          keychain_path="$RUNNER_TEMP/pw-env-signing-${{ matrix.target }}.keychain-db"

          printf '%s' "$APPLE_CERT_BASE64" | base64 --decode > "$cert_path" 2>/dev/null || \
            printf '%s' "$APPLE_CERT_BASE64" | base64 -D > "$cert_path"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security default-keychain -s "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security import "$cert_path" -k "$keychain_path" -P "$APPLE_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"

          echo "PW_ENV_TEMP_KEYCHAIN=$keychain_path" >> "$GITHUB_ENV"

      - name: Sign macOS binary
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ "$MACOS_SIGNING_SECRETS_PRESENT" != "true" ]; then
            echo "Apple signing secrets not configured; leaving macOS binary unsigned."
            exit 0
          fi

          binary_path="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          codesign --force --options runtime --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$binary_path"
          codesign --verify --verbose=2 "$binary_path"

      - name: Submit macOS binary for notarization
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ "$MACOS_SIGNING_SECRETS_PRESENT" != "true" ]; then
            echo "Apple signing secrets not configured; skipping notarization submission."
            exit 0
          fi

          if [ "$MACOS_NOTARIZATION_SECRETS_PRESENT" != "true" ]; then
            echo "Apple notarization secrets not configured; skipping notarization submission."
            exit 0
          fi

          binary_path="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          submission_path="$RUNNER_TEMP/pw-env-${RELEASE_TAG}-${{ matrix.target }}-notarize.zip"
          response_path="$RUNNER_TEMP/notarytool-${{ matrix.target }}.json"
          metadata_path="notarization-${{ matrix.target }}.json"

          ditto -c -k --keepParent "$binary_path" "$submission_path"
          xcrun notarytool submit "$submission_path" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --output-format json > "$response_path"

          submission_id=$(jq -r '.id // empty' "$response_path")
          if [ -z "$submission_id" ]; then
            echo "::error::Apple notarization submission did not return a submission id"
            cat "$response_path"
            exit 1
          fi

          jq -n \
            --arg tag "$RELEASE_TAG" \
            --arg target "${{ matrix.target }}" \
            --arg binary "${{ matrix.binary }}" \
            --arg archive "${{ matrix.archive }}" \
            --arg asset_name "pw-env-${RELEASE_TAG}-${{ matrix.target }}.${{ matrix.archive }}" \
            --arg submission_id "$submission_id" \
            --arg submitted_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              tag: $tag,
              target: $target,
              binary: $binary,
              archive: $archive,
              asset_name: $asset_name,
              submission_id: $submission_id,
              submitted_at: $submitted_at
            }' > "$metadata_path"

      - name: Upload notarization metadata
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # pin: v7.0.1
        with:
          name: notarization-${{ env.RELEASE_TAG }}-${{ matrix.target }}
          path: notarization-${{ matrix.target }}.json
          if-no-files-found: ignore

      - name: Stage release files
        shell: bash
        run: |
          package_dir="dist/${{ matrix.target }}"
          mkdir -p "$package_dir"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "$package_dir/${{ matrix.binary }}"
          cp LICENSE "$package_dir/LICENSE"

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          tar -czf "pw-env-${RELEASE_TAG}-${{ matrix.target }}.tar.gz" -C "dist/${{ matrix.target }}" .

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/${{ matrix.target }}/*" -DestinationPath "pw-env-${env:RELEASE_TAG}-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # pin: v7.0.1
        with:
          name: pw-env-${{ matrix.target }}
          path: pw-env-${{ env.RELEASE_TAG }}-${{ matrix.target }}.*

      - name: Clean up Apple signing keychain
        if: runner.os == 'macOS' && always()
        shell: bash
        run: |
          if [ -n "${PW_ENV_TEMP_KEYCHAIN:-}" ] && [ -f "$PW_ENV_TEMP_KEYCHAIN" ]; then
            security delete-keychain "$PW_ENV_TEMP_KEYCHAIN"
          fi

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin: v6.0.2
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # pin: v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Add license asset
        shell: bash
        run: |
          cp LICENSE dist/LICENSE

      - name: Generate release notes
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # pin: v4.7.1
        with:
          config: .github/cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TAG" \
            --notes-file RELEASE_NOTES.md \
            dist/*
