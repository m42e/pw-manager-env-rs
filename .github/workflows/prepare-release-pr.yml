name: Prepare Release PR

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v (e.g. 1.2.3)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    name: Prepare release v${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin: v6.0.2
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must be in semver format (e.g. 1.2.3)"
            exit 1
          fi

      - name: Check tag does not exist
        run: |
          if git rev-parse "v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ inputs.version }} already exists"
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # pin: v1
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # pin: v2.9.1

      - name: Install rumdl
        run: python -m pip install --user rumdl

      - name: Update version in Cargo.toml
        run: |
          sed -i 's/^version = ".*"/version = "${{ inputs.version }}"/' Cargo.toml
          cargo check --quiet 2>/dev/null || cargo update -p pw-env

      - name: Create release notes directory
        run: mkdir -p release-notes

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        with:
          config: .github/cliff.toml
          args: --tag "v${{ inputs.version }}" --unreleased --strip header
        env:
          OUTPUT: release-notes/v${{ inputs.version }}.md

      - name: Format release notes with rumdl
        run: ~/.local/bin/rumdl fmt "release-notes/v${{ inputs.version }}.md"

      - name: Upload release notes
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # pin: v7.0.0
        with:
          name: release-notes
          path: release-notes/v${{ inputs.version }}.md

      - name: Create release branch and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch="release/v${{ inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add Cargo.toml Cargo.lock release-notes/
          git commit -m "chore: prepare release v${{ inputs.version }}"
          git push origin "$branch" --force
          gh pr create \
            --base main \
            --head "$branch" \
            --title "Release v${{ inputs.version }}" \
            --body "Automated release preparation for **v${{ inputs.version }}**.

          ## Checklist
          - [ ] Version bump looks correct
          - [ ] Release notes are accurate
          - [ ] CI passes" \
            --label release
